- name: name-only
- name: repo-with-gen-part
  gen:
    flavours:
    - app
    language: generic
- name: repo-with-replace-part
  replace:
    architect-orb: true
    renovate: true
- name: generic-go
  gen:
    flavours:
    - generic
    language: go
    installUpdateChart: false
  lifecycle: deprecated
  replace:
    architect-orb: false
    renovate: true
    precommit: true
- name: repo-with-ci-and-upstream
  componentType: service
  gen:
    flavours:
    - app
    language: go
    preCommit:
    - helmchart
    ci:
      generate: true
      releaseWorkflow: legacy
  upstreamCheck:
    chartPath: helm/foo
    upstreamRepo: org/foo
